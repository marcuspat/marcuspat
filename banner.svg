<svg width="1200" height="230" viewBox="0 0 1200 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
    <filter id="glow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtle-glow" x="-5%" y="-50%" width="110%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.1"/>
    </pattern>
    <pattern id="scanlines" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="black" opacity="0.06"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="230" fill="#050505"/>

  <!-- Grid overlay -->
  <rect width="1200" height="230" fill="url(#grid)"/>

  <!-- Scanlines -->
  <rect width="1200" height="230" fill="url(#scanlines)"/>

  <!-- Vignette -->
  <rect width="1200" height="230" fill="url(#vignette)"/>

  <!-- Top border glow -->
  <rect x="0" y="0" width="1200" height="2" fill="#22d3ee" opacity="0.9" filter="url(#subtle-glow)"/>

  <!-- Left border -->
  <rect x="0" y="0" width="3" height="230" fill="#22d3ee" opacity="0.9"/>

  <!-- Right border -->
  <rect x="1197" y="0" width="3" height="230" fill="#22d3ee" opacity="0.35"/>

  <!-- Bottom border -->
  <rect x="0" y="228" width="1200" height="2" fill="#22d3ee" opacity="0.35"/>

  <!-- Top-left corner bracket -->
  <rect x="3"  y="3"  width="40" height="2"  fill="#22d3ee" opacity="0.7"/>
  <rect x="3"  y="3"  width="2"  height="40" fill="#22d3ee" opacity="0.7"/>

  <!-- Top-right corner bracket -->
  <rect x="1157" y="3"  width="40" height="2"  fill="#22d3ee" opacity="0.4"/>
  <rect x="1195" y="3"  width="2"  height="40" fill="#22d3ee" opacity="0.4"/>

  <!-- Bottom-left corner bracket -->
  <rect x="3"  y="225" width="40" height="2"  fill="#22d3ee" opacity="0.35"/>
  <rect x="3"  y="187" width="2"  height="40" fill="#22d3ee" opacity="0.35"/>

  <!-- Bottom-right corner bracket -->
  <rect x="1157" y="225" width="40" height="2"  fill="#22d3ee" opacity="0.25"/>
  <rect x="1195" y="187" width="2"  height="40" fill="#22d3ee" opacity="0.25"/>

  <!-- Name — Orbitron, cyan glow -->
  <text x="58" y="118"
    font-family="Orbitron, 'Courier New', monospace"
    font-size="56"
    font-weight="700"
    fill="#22d3ee"
    filter="url(#glow)"
    letter-spacing="6">MARCUS PATMAN</text>

  <!-- Terminal tagline -->
  <text x="61" y="158"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="15"
    fill="#22c55e"
    letter-spacing="1">$ ./run --role=agentic-engineer --loc=los-angeles --status=active</text>

  <!-- Right HUD stats -->
  <text x="1152" y="100" text-anchor="end"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="11.5" fill="#4b5563" letter-spacing="1">[ GITHUB RANK: TOP 2% ]</text>

  <text x="1152" y="122" text-anchor="end"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="11.5" fill="#4b5563" letter-spacing="1">[ COMMITS / YR: 3,000+ ]</text>

  <text x="1152" y="144" text-anchor="end"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="11.5" fill="#4b5563" letter-spacing="1">[ CRATE DOWNLOADS: 11K+ ]</text>

  <text x="1152" y="166" text-anchor="end"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="11.5" fill="#22d3ee" filter="url(#subtle-glow)" letter-spacing="1">[ STATUS: ALL SYSTEMS GO ]</text>
</svg>
